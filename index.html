<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Snake and Ladders</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen">
            <h1 class="title">SNAKES & LADDERS</h1>
            <div class="player-selection">
                <p>Number of Players (1-8):</p>
                <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
                    <input type="number" id="player-count-input" class="quiz-input" style="width: 80px;" min="1" max="8" value="2" oninput="validatePlayerCount(this)">
                    <button class="btn" onclick="handleStartGame()">START GAME</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen">
            <div class="game-container">
                <img src="assets/textures/games/board.png" alt="Board" id="board-img">
                <div id="players-layer" class="players-layer"></div>
            </div>

            <div class="ui-panel">
                <div id="turn-indicator" class="turn-indicator">
                    WAITING...
                </div>
                
                <div class="dice-container">
                    <div id="dice-face" class="dice-1"></div>
                    <button id="roll-btn" class="btn" onclick="handleRoll()">ROLL DICE</button>
                </div>

                <div id="game-log" class="game-log">
                    <div class="log-entry">Welcome to Snakes & Ladders!</div>
                </div>
            </div>
        </div>

        <!-- Quiz Modal -->
        <div id="quiz-modal" class="modal-overlay">
            <div class="quiz-container">
                <div class="quiz-header">TEACHER QUIZ</div>
                <div id="quiz-timer-container">
                    <div id="quiz-timer-bar"></div>
                </div>
                <div class="quiz-body">
                    <img id="quiz-image" src="" alt="Quiz Question Image" class="quiz-question-image" style="display: none;">
                    <h2 id="quiz-question" class="question-text">Loading question...</h2>
                </div>
                <div class="quiz-footer">
                    <input type="text" id="quiz-answer-input" class="quiz-input" placeholder="Enter your answer..." autocomplete="off">
                    <button id="quiz-submit-btn" class="btn">SUBMIT</button>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/questions-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
